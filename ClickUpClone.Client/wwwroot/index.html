<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClickUpClone.Client</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="ClickUpClone.Client.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.insertTextAtCursor = function (elementId, openTag, closeTag) {
            var el = document.getElementById(elementId);
            if (!el) return "";
            var start = el.selectionStart;
            var end = el.selectionEnd;
            var text = el.value;
            var selectedText = text.substring(start, end);
            var replacement = openTag + selectedText + closeTag;
            el.value = text.substring(0, start) + replacement + text.substring(end);
            el.focus();
            el.selectionStart = start + openTag.length;
            el.selectionEnd = start + openTag.length + selectedText.length;
            
            // Dispatch input event so Blazor @bind updates the value
            var event = new Event('input', { bubbles: true });
            el.dispatchEvent(event);
            return el.value;
        };
    </script>
</body>

</html>
